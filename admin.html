<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IDS Hub Admin</title>
  <style>
    :root {
      --bg: #f0f4f9;
      --ink: #0f172a;
      --muted: #64748b;
      --panel: #fff;
      --line: #e2e8f0;
      --brand: #0969da;
      --brand-light: #dbeafe;
      --success: #16a34a;
      --success-light: #dcfce7;
      --warning: #ea580c;
      --warning-light: #fed7aa;
      --danger: #dc2626;
      --danger-light: #fee2e2;
      --dark: #1e293b;
      --radius: 12px;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, .05);
      --shadow: 0 4px 6px rgba(0, 0, 0, .07);
      --shadow-lg: 0 10px 15px rgba(0, 0, 0, .1);
      font-family: "Inter", "Noto Sans JP", "Yu Gothic", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #f0f4f9 0%, #f8fafc 100%);
      color: var(--ink);
    }
    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; }
    a { color: inherit; text-decoration: none; }

    /* ========== トップバー ========== */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px clamp(16px, 4vw, 32px);
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, .95);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow-sm);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      color: var(--ink);
    }
    .mark {
      width: 40px;
      height: 40px;
      border-radius: calc(var(--radius) - 4px);
      display: block;
      object-fit: contain;
      padding: 4px;
      background: linear-gradient(135deg, #dbeafe, #e0e7ff);
      box-shadow: var(--shadow-sm);
    }
    .brand span {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .brand strong {
      font-size: 16px;
      line-height: 1;
    }
    .brand small {
      font-size: 11px;
      color: var(--muted);
      font-weight: 500;
    }

    .topbar-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    /* ========== メインコンテンツ ========== */
    main {
      width: min(1400px, 100%);
      margin: 0 auto;
      padding: 24px clamp(16px, 4vw, 32px);
    }

    .hero {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 24px;
      padding: 28px;
      border-radius: var(--radius);
      background: linear-gradient(135deg, #0969da 0%, #0d47a1 100%);
      color: white;
      box-shadow: var(--shadow-lg);
    }
    .hero h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 40px);
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .hero p {
      margin: 8px 0 0 0;
      color: rgba(255, 255, 255, .9);
      font-size: 14px;
      line-height: 1.6;
    }

    h1, h2, h3 { margin: 0; letter-spacing: 0; }
    h2 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--ink);
    }
    h3 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--ink);
    }
    p { color: var(--muted); line-height: 1.6; }

    /* ========== ログインパネル ========== */
    .login-container {
      display: grid;
      place-items: center;
      min-height: calc(100vh - 100px);
      padding: 20px;
    }
    .login-panel {
      width: 100%;
      max-width: 420px;
      padding: 32px;
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow-lg);
    }
    .login-panel h2 {
      margin-bottom: 24px;
      text-align: center;
      font-size: 24px;
    }

    /* ========== サマリーグリッド ========== */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .summary-item {
      padding: 20px;
      border-radius: var(--radius);
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-sm);
      transition: all .2s ease;
    }
    .summary-item:hover {
      border-color: var(--brand);
      box-shadow: var(--shadow);
      transform: translateY(-2px);
    }
    .summary-item strong {
      display: block;
      font-size: 32px;
      line-height: 1;
      color: var(--brand);
      margin-bottom: 8px;
    }
    .summary-item span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    /* ========== タブナビゲーション ========== */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      border-bottom: 2px solid var(--line);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .tab {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 16px;
      border: none;
      border-bottom: 3px solid transparent;
      background: none;
      color: var(--muted);
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all .2s ease;
      white-space: nowrap;
    }
    .tab:hover {
      color: var(--ink);
    }
    .tab.active {
      color: var(--brand);
      border-bottom-color: var(--brand);
    }

    /* ========== ビュー ========== */
    .view {
      display: none;
    }
    .view.active {
      display: grid;
      gap: 20px;
    }
    .view-grid {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 20px;
      align-items: start;
    }

    /* ========== パネル ========== */
    .panel {
      padding: 24px;
      border-radius: var(--radius);
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    /* ========== フォーム ========== */
    .stack {
      display: grid;
      gap: 16px;
    }
    .field {
      display: grid;
      gap: 8px;
    }
    label {
      color: var(--ink);
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input, textarea, select {
      width: 100%;
      min-height: 40px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: calc(var(--radius) - 4px);
      background: #fff;
      color: var(--ink);
      outline: 0;
      font-size: 14px;
      transition: all .2s ease;
    }
    textarea {
      min-height: 100px;
      resize: vertical;
      font-family: inherit;
    }
    input:focus, textarea:focus, select:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px var(--brand-light);
      background: #fff;
    }
    input:disabled, textarea:disabled, select:disabled {
      background: #f8fafc;
      color: var(--muted);
      cursor: not-allowed;
    }

    /* ========== ボタン ========== */
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .button {
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 16px;
      border: 1px solid var(--line);
      border-radius: calc(var(--radius) - 4px);
      background: var(--panel);
      color: var(--ink);
      font-weight: 600;
      font-size: 13px;
      text-decoration: none;
      cursor: pointer;
      transition: all .2s ease;
      white-space: nowrap;
    }
    .button:hover {
      border-color: var(--muted);
      background: #f8fafc;
    }
    .button.primary {
      border-color: var(--brand);
      background: var(--brand);
      color: #fff;
    }
    .button.primary:hover {
      background: #0860ca;
      border-color: #0860ca;
      box-shadow: var(--shadow);
    }
    .button.success {
      border-color: var(--success);
      background: var(--success);
      color: #fff;
    }
    .button.success:hover {
      background: #15803d;
      border-color: #15803d;
    }
    .button.danger {
      border-color: var(--danger);
      color: var(--danger);
    }
    .button.danger:hover {
      background: var(--danger-light);
    }
    .button:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    /* ========== テーブル ========== */
    .table-wrapper {
      overflow-x: auto;
      border-radius: var(--radius);
      border: 1px solid var(--line);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
    }
    th {
      background: #f8fafc;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    tbody tr {
      transition: background .2s ease;
    }
    tbody tr:hover {
      background: #f8fafc;
    }
    tbody tr:last-child td {
      border-bottom: none;
    }

    /* ========== ステータスバッジ ========== */
    .status {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 4px 10px;
      border-radius: 999px;
      background: #f1f5f9;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .status.on {
      background: var(--success-light);
      color: var(--success);
    }
    .status.off {
      background: var(--danger-light);
      color: var(--danger);
    }
    .status.warning {
      background: var(--warning-light);
      color: var(--warning);
    }

    /* ========== トースト通知 ========== */
    .toast {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 200;
      max-width: 360px;
      padding: 14px 16px;
      border-radius: calc(var(--radius) - 4px);
      background: var(--dark);
      color: #fff;
      box-shadow: var(--shadow-lg);
      opacity: 0;
      transform: translateY(100px);
      transition: all .3s ease;
      font-size: 14px;
      line-height: 1.5;
    }
    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* ========== ユーティリティ ========== */
    .hidden {
      display: none !important;
    }
    .text-muted {
      color: var(--muted);
      font-size: 13px;
    }
    .text-sm {
      font-size: 13px;
    }

    /* ========== レスポンシブ ========== */
    @media (max-width: 1024px) {
      .view-grid {
        grid-template-columns: 1fr;
      }
      .summary-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 768px) {
      main {
        padding: 16px clamp(12px, 4vw, 20px);
      }
      .hero {
        padding: 20px;
        flex-direction: column;
        align-items: flex-start;
      }
      .hero h1 {
        font-size: 28px;
      }
      .summary-grid {
        grid-template-columns: 1fr;
      }
      .tabs {
        gap: 4px;
      }
      .tab {
        padding: 0 12px;
        font-size: 13px;
      }
      .panel {
        padding: 16px;
      }
      .table-wrapper {
        border: none;
        border-radius: 0;
      }
      table {
        font-size: 13px;
      }
      th, td {
        padding: 10px 12px;
      }
      .button {
        padding: 0 12px;
        font-size: 12px;
        min-height: 36px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html">
      <img class="mark" src="assets/ids-logo.png" alt="IDS">
      <span>
        <strong>IDS Hub Admin</strong>
        <small>Content Control</small>
      </span>
    </a>
    <div class="topbar-actions">
      <a class="button" href="index.html">← サイトへ戻る</a>
      <button class="button danger hidden" type="button" id="logoutButton">ログアウト</button>
    </div>
  </header>

  <main>
    <section class="hero" id="loginHero">
      <div>
        <h1>管理画面へようこそ</h1>
        <p>IDS Hubの公開コンテンツ、ユーザー、お知らせを一元管理できます。</p>
      </div>
    </section>

    <!-- ========== ログインパネル ========== -->
    <div class="login-container" id="loginContainer">
      <form class="login-panel" id="loginPanel">
        <h2>管理者ログイン</h2>
        <div class="stack">
          <div class="field">
            <label for="adminEmail">メールアドレス</label>
            <input id="adminEmail" name="email" type="email" autocomplete="email" placeholder="admin@example.com" required>
          </div>
          <div class="field">
            <label for="adminPassword">パスワード</label>
            <input id="adminPassword" name="password" type="password" autocomplete="current-password" placeholder="••••••••" required>
          </div>
          <button class="button primary" type="submit" style="width: 100%; margin-top: 8px;">ログイン</button>
        </div>
      </form>
    </div>

    <!-- ========== ダッシュボード ========== -->
    <section class="hidden" id="dashboard">
      <!-- サマリー -->
      <div class="summary-grid" aria-label="管理サマリー">
        <div class="summary-item">
          <strong id="toolTotal">0</strong>
          <span>公開コンテンツ</span>
        </div>
        <div class="summary-item">
          <strong id="userTotal">0</strong>
          <span>登録ユーザー</span>
        </div>
        <div class="summary-item">
          <strong id="adminTotal">0</strong>
          <span>管理者</span>
        </div>
        <div class="summary-item">
          <strong id="announcementTotal">0</strong>
          <span>公開お知らせ</span>
        </div>
      </div>

      <!-- タブナビゲーション -->
      <div class="tabs">
        <button class="button tab active" type="button" data-view="toolsView">
          📦 ツール・ゲーム
        </button>
        <button class="button tab" type="button" data-view="usersView">
          👥 ユーザー管理
        </button>
        <button class="button tab" type="button" data-view="announcementsView">
          📢 お知らせ
        </button>
      </div>

      <!-- ツール管理ビュー -->
      <div class="view active" id="toolsView">
        <div class="view-grid">
          <form class="panel stack" id="toolForm">
            <h3>ツール追加・編集</h3>
            <input type="hidden" id="toolId" name="id">
            <div class="field">
              <label for="toolName">ツール名 *</label>
              <input id="toolName" name="name" placeholder="例: 文字数カウント" required>
            </div>
            <div class="field">
              <label for="toolDescription">説明 *</label>
              <textarea id="toolDescription" name="description" placeholder="ツールの説明を入力..." required></textarea>
            </div>
            <div class="field">
              <label for="toolUrl">URL *</label>
              <input id="toolUrl" name="url" type="url" placeholder="https://example.com" required>
            </div>
            <div class="field">
              <label for="toolCategory">カテゴリ *</label>
              <select id="toolCategory" name="category" required>
                <option value="tool utility">日常ツール</option>
                <option value="tool dev">開発ツール</option>
                <option value="game">ゲーム</option>
              </select>
            </div>
            <div class="field">
              <label for="toolOrder">表示順 (小さいほど上)</label>
              <input id="toolOrder" name="order" type="number" min="1" value="10">
            </div>
            <div class="actions">
              <button class="button primary" type="submit" style="flex: 1;">💾 保存</button>
              <button class="button" type="button" id="clearToolForm">🔄 クリア</button>
            </div>
          </form>
          <div class="panel">
            <h3>登録済みツール</h3>
            <div class="table-wrapper">
              <table>
                <thead>
                  <tr>
                    <th>ツール名</th>
                    <th>カテゴリ</th>
                    <th>状態</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody id="toolsBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

      <!-- ユーザー管理ビュー -->
      <div class="view" id="usersView">
        <div class="view-grid">
          <form class="panel stack" id="userForm">
            <h3>ユーザー追加</h3>
            <div class="field">
              <label for="userName">表示名 *</label>
              <input id="userName" name="name" placeholder="例: 田中太郎" required>
            </div>
            <div class="field">
              <label for="userEmail">メールアドレス *</label>
              <input id="userEmail" name="email" type="email" placeholder="user@example.com" required>
            </div>
            <div class="field">
              <label for="userPassword">パスワード (8文字以上) *</label>
              <input id="userPassword" name="password" type="password" minlength="8" placeholder="••••••••" required>
            </div>
            <div class="field">
              <label for="userRole">権限</label>
              <select id="userRole" name="role">
                <option value="user">一般ユーザー</option>
                <option value="admin">管理者</option>
              </select>
            </div>
            <button class="button primary" type="submit" style="width: 100%;">➕ ユーザーを作成</button>
          </form>
          <div class="panel">
            <h3>登録済みユーザー</h3>
            <div class="table-wrapper">
              <table>
                <thead>
                  <tr>
                    <th>メール</th>
                    <th>名前</th>
                    <th>権限</th>
                    <th>状態</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody id="usersBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

      <!-- お知らせ管理ビュー -->
      <div class="view" id="announcementsView">
        <div class="view-grid">
          <form class="panel stack" id="announcementForm">
            <h3>お知らせ追加・編集</h3>
            <input type="hidden" id="announcementId" name="id">
            <div class="field">
              <label for="announcementTitle">タイトル *</label>
              <input id="announcementTitle" name="title" placeholder="例: 新機能のお知らせ" required>
            </div>
            <div class="field">
              <label for="announcementBody">本文 *</label>
              <textarea id="announcementBody" name="body" placeholder="お知らせの内容を入力..." required></textarea>
            </div>
            <div class="field">
              <label for="announcementOrder">表示順 (小さいほど上)</label>
              <input id="announcementOrder" name="order" type="number" min="1" value="10">
            </div>
            <div class="actions">
              <button class="button primary" type="submit" style="flex: 1;">💾 保存</button>
              <button class="button" type="button" id="clearAnnouncementForm">🔄 クリア</button>
            </div>
          </form>
          <div class="panel">
            <h3>登録済みお知らせ</h3>
            <div class="table-wrapper">
              <table>
                <thead>
                  <tr>
                    <th>タイトル</th>
                    <th>状態</th>
                    <th>表示順</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody id="announcementsBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getFirestore,
      collection,
      getDocs,
      doc,
      getDoc,
      setDoc,
      updateDoc,
      deleteDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      projectId: "idm-hub-20260516",
      appId: "1:315082566768:web:03c7c4b57f75ef9a01d8b5",
      storageBucket: "idm-hub-20260516.firebasestorage.app",
      apiKey: "AIzaSyC_nT_seXtKnZWff-76jvJT0EZfkL21TxE",
      authDomain: "idm-hub-20260516.firebaseapp.com",
      messagingSenderId: "315082566768"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const toast = document.querySelector("#toast");
    const dashboard = document.querySelector("#dashboard");
    const loginPanel = document.querySelector("#loginPanel");
    const loginContainer = document.querySelector("#loginContainer");
    const loginHero = document.querySelector("#loginHero");
    const logoutButton = document.querySelector("#logoutButton");
    let users = [];
    let tools = [];
    let announcements = [];

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 3200);
    }

    function toBase64(value) {
      return btoa(unescape(encodeURIComponent(value)));
    }

    function normalizeEmail(email) {
      return String(email).trim().toLowerCase();
    }

    function slugify(value) {
      return String(value)
        .trim()
        .toLowerCase()
        .replace(/[^\w\s-]/g, "")
        .replace(/\s+/g, "-")
        .replace(/-+/g, "-");
    }

    function makeId(prefix) {
      return `${prefix}-${Date.now()}`;
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[char]));
    }

    async function loginAdmin(formData) {
      const email = normalizeEmail(formData.get("email"));
      const password = String(formData.get("password") || "");
      const snapshot = await getDoc(doc(db, "users", email));

      if (!snapshot.exists()) throw new Error("管理者ユーザーが見つかりません。");
      const user = snapshot.data();
      if (!user.enabled || user.role !== "admin" || user.passwordBase64 !== toBase64(password)) {
        throw new Error("管理者ログインに失敗しました。");
      }

      sessionStorage.setItem("idsHubAdmin", JSON.stringify({ email, name: user.name || "" }));
      loginContainer.classList.add("hidden");
      loginHero.classList.add("hidden");
      dashboard.classList.remove("hidden");
      logoutButton.classList.remove("hidden");
      await loadAll();
    }

    async function loadAll() {
      const [userSnapshot, toolSnapshot, announcementSnapshot] = await Promise.all([
        getDocs(collection(db, "users")),
        getDocs(collection(db, "tools")),
        getDocs(collection(db, "announcements"))
      ]);

      users = userSnapshot.docs.map((item) => ({ id: item.id, ...item.data() })).sort((a, b) => a.email.localeCompare(b.email));
      tools = toolSnapshot.docs.map((item) => ({ id: item.id, ...item.data() })).sort((a, b) => Number(a.order || 999) - Number(b.order || 999));
      announcements = announcementSnapshot.docs.map((item) => ({ id: item.id, ...item.data() })).sort((a, b) => Number(a.order || 999) - Number(b.order || 999));
      document.querySelector("#toolTotal").textContent = String(tools.filter((tool) => tool.enabled !== false).length);
      document.querySelector("#userTotal").textContent = String(users.length);
      document.querySelector("#adminTotal").textContent = String(users.filter((user) => user.role === "admin").length);
      document.querySelector("#announcementTotal").textContent = String(announcements.filter((item) => item.enabled !== false).length);
      renderUsers();
      renderTools();
      renderAnnouncements();
    }

    function renderTools() {
      document.querySelector("#toolsBody").innerHTML = tools.map((tool) => `
        <tr>
          <td>
            <strong>${escapeHtml(tool.name)}</strong>
            <br>
            <span class="text-muted">${escapeHtml(tool.url)}</span>
          </td>
          <td>${escapeHtml(tool.label || tool.category)}</td>
          <td><span class="status ${tool.enabled === false ? "off" : "on"}">${tool.enabled === false ? "停止" : "公開"}</span></td>
          <td>
            <div class="actions">
              <button class="button" type="button" data-edit-tool="${escapeHtml(tool.id)}" title="編集">✏️</button>
              <button class="button" type="button" data-toggle-tool="${escapeHtml(tool.id)}" title="${tool.enabled === false ? "公開" : "停止"}">${tool.enabled === false ? "🔓" : "🔒"}</button>
              <button class="button danger" type="button" data-delete-tool="${escapeHtml(tool.id)}" title="削除">🗑️</button>
            </div>
          </td>
        </tr>
      `).join("");
    }

    function renderUsers() {
      document.querySelector("#usersBody").innerHTML = users.map((user) => `
        <tr>
          <td><strong>${escapeHtml(user.email)}</strong></td>
          <td>${escapeHtml(user.name)}</td>
          <td>
            <select data-user-role="${escapeHtml(user.id)}" style="padding: 6px 8px; border-radius: 6px; border: 1px solid var(--line); font-size: 13px;">
              <option value="user" ${user.role !== "admin" ? "selected" : ""}>一般ユーザー</option>
              <option value="admin" ${user.role === "admin" ? "selected" : ""}>管理者</option>
            </select>
          </td>
          <td><span class="status ${user.enabled === false ? "off" : "on"}">${user.enabled === false ? "停止" : "有効"}</span></td>
          <td>
            <div class="actions">
              <button class="button" type="button" data-toggle-user="${escapeHtml(user.id)}" title="${user.enabled === false ? "有効化" : "停止"}">${user.enabled === false ? "✅" : "⏸️"}</button>
              <button class="button" type="button" data-reset-user="${escapeHtml(user.id)}" title="パスワード再設定">🔑</button>
              <button class="button danger" type="button" data-delete-user="${escapeHtml(user.id)}" title="削除">🗑️</button>
            </div>
          </td>
        </tr>
      `).join("");
    }

    function renderAnnouncements() {
      document.querySelector("#announcementsBody").innerHTML = announcements.map((item) => `
        <tr>
          <td>
            <strong>${escapeHtml(item.title)}</strong>
            <br>
            <span class="text-muted">${escapeHtml(item.body.substring(0, 60))}${item.body.length > 60 ? "..." : ""}</span>
          </td>
          <td><span class="status ${item.enabled === false ? "off" : "on"}">${item.enabled === false ? "停止" : "公開"}</span></td>
          <td>${escapeHtml(item.order || "")}</td>
          <td>
            <div class="actions">
              <button class="button" type="button" data-edit-announcement="${escapeHtml(item.id)}" title="編集">✏️</button>
              <button class="button" type="button" data-toggle-announcement="${escapeHtml(item.id)}" title="${item.enabled === false ? "公開" : "停止"}">${item.enabled === false ? "🔓" : "🔒"}</button>
              <button class="button danger" type="button" data-delete-announcement="${escapeHtml(item.id)}" title="削除">🗑️</button>
            </div>
          </td>
        </tr>
      `).join("");
    }

    document.querySelector("#loginPanel").addEventListener("submit", async (event) => {
      event.preventDefault();
      try {
        await loginAdmin(new FormData(event.currentTarget));
        showToast("✅ 管理者としてログインしました。");
      } catch (error) {
        showToast("❌ " + (error.message || "ログインに失敗しました。"));
      }
    });

    document.querySelector("#toolForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const formData = new FormData(event.currentTarget);
      const id = formData.get("id") || slugify(formData.get("name"));
      const category = String(formData.get("category"));
      const label = category.includes("dev") ? "開発ツール" : category.includes("game") ? "ゲーム" : "日常ツール";
      const color = category.includes("game") ? "yellow" : category.includes("dev") ? "dark" : "green";

      await setDoc(doc(db, "tools", id), {
        name: String(formData.get("name")).trim(),
        description: String(formData.get("description")).trim(),
        url: String(formData.get("url")).trim(),
        category,
        label,
        color,
        keywords: `${formData.get("name")} ${category}`,
        enabled: true,
        order: Number(formData.get("order") || 999),
        updatedAt: serverTimestamp()
      }, { merge: true });

      event.currentTarget.reset();
      document.querySelector("#toolId").value = "";
      await loadAll();
      showToast("✅ ツールを保存しました。");
    });

    document.querySelector("#userForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const formData = new FormData(event.currentTarget);
      const email = normalizeEmail(formData.get("email"));
      const password = String(formData.get("password") || "");
      if (password.length < 8) {
        showToast("❌ パスワードは8文字以上で入力してください。");
        return;
      }

      await setDoc(doc(db, "users", email), {
        name: String(formData.get("name")).trim(),
        email,
        passwordBase64: toBase64(password),
        enabled: true,
        role: String(formData.get("role")),
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp()
      });

      event.currentTarget.reset();
      await loadAll();
      showToast("✅ ユーザーを作成しました。");
    });

    document.querySelector("#announcementForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const formData = new FormData(event.currentTarget);
      const id = formData.get("id") || makeId("announcement");

      await setDoc(doc(db, "announcements", id), {
        title: String(formData.get("title")).trim(),
        body: String(formData.get("body")).trim(),
        enabled: true,
        order: Number(formData.get("order") || 999),
        publishedAt: serverTimestamp(),
        updatedAt: serverTimestamp()
      }, { merge: true });

      event.currentTarget.reset();
      document.querySelector("#announcementId").value = "";
      await loadAll();
      showToast("✅ お知らせを保存しました。");
    });

    document.addEventListener("click", async (event) => {
      const editToolId = event.target.dataset.editTool;
      const toggleToolId = event.target.dataset.toggleTool;
      const deleteToolId = event.target.dataset.deleteTool;
      const toggleUserId = event.target.dataset.toggleUser;
      const resetUserId = event.target.dataset.resetUser;
      const deleteUserId = event.target.dataset.deleteUser;
      const editAnnouncementId = event.target.dataset.editAnnouncement;
      const toggleAnnouncementId = event.target.dataset.toggleAnnouncement;
      const deleteAnnouncementId = event.target.dataset.deleteAnnouncement;

      if (editToolId) {
        const tool = tools.find((item) => item.id === editToolId);
        document.querySelector("#toolId").value = tool.id;
        document.querySelector("#toolName").value = tool.name || "";
        document.querySelector("#toolDescription").value = tool.description || "";
        document.querySelector("#toolUrl").value = tool.url || "";
        document.querySelector("#toolCategory").value = tool.category || "tool utility";
        document.querySelector("#toolOrder").value = tool.order || 10;
        document.querySelector("#toolForm").scrollIntoView({ behavior: "smooth" });
      }

      if (toggleToolId) {
        const tool = tools.find((item) => item.id === toggleToolId);
        await updateDoc(doc(db, "tools", toggleToolId), { enabled: tool.enabled === false, updatedAt: serverTimestamp() });
        await loadAll();
      }

      if (deleteToolId && confirm("このツールを削除しますか？")) {
        await deleteDoc(doc(db, "tools", deleteToolId));
        await loadAll();
        showToast("✅ ツールを削除しました。");
      }

      if (toggleUserId) {
        const user = users.find((item) => item.id === toggleUserId);
        await updateDoc(doc(db, "users", toggleUserId), { enabled: user.enabled === false, updatedAt: serverTimestamp() });
        await loadAll();
      }

      if (resetUserId) {
        const password = prompt("新しいパスワードを8文字以上で入力してください。");
        if (password && password.length >= 8) {
          await updateDoc(doc(db, "users", resetUserId), { passwordBase64: toBase64(password), updatedAt: serverTimestamp() });
          showToast("✅ パスワードを更新しました。");
        }
      }

      if (deleteUserId && confirm("このユーザーを削除しますか？")) {
        await deleteDoc(doc(db, "users", deleteUserId));
        await loadAll();
        showToast("✅ ユーザーを削除しました。");
      }

      if (editAnnouncementId) {
        const item = announcements.find((announcement) => announcement.id === editAnnouncementId);
        document.querySelector("#announcementId").value = item.id;
        document.querySelector("#announcementTitle").value = item.title || "";
        document.querySelector("#announcementBody").value = item.body || "";
        document.querySelector("#announcementOrder").value = item.order || 10;
        document.querySelector("#announcementForm").scrollIntoView({ behavior: "smooth" });
      }

      if (toggleAnnouncementId) {
        const item = announcements.find((announcement) => announcement.id === toggleAnnouncementId);
        await updateDoc(doc(db, "announcements", toggleAnnouncementId), { enabled: item.enabled === false, updatedAt: serverTimestamp() });
        await loadAll();
      }

      if (deleteAnnouncementId && confirm("このお知らせを削除しますか？")) {
        await deleteDoc(doc(db, "announcements", deleteAnnouncementId));
        await loadAll();
        showToast("✅ お知らせを削除しました。");
      }
    });

    document.addEventListener("change", async (event) => {
      const userId = event.target.dataset.userRole;
      if (userId) {
        await updateDoc(doc(db, "users", userId), { role: event.target.value, updatedAt: serverTimestamp() });
        await loadAll();
        showToast("✅ 権限を更新しました。");
      }
    });

    document.querySelector("#clearToolForm").addEventListener("click", () => {
      document.querySelector("#toolForm").reset();
      document.querySelector("#toolId").value = "";
    });

    document.querySelector("#clearAnnouncementForm").addEventListener("click", () => {
      document.querySelector("#announcementForm").reset();
      document.querySelector("#announcementId").value = "";
    });

    document.querySelectorAll(".tab").forEach((button) => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach((tab) => tab.classList.toggle("active", tab === button));
        document.querySelectorAll(".view").forEach((view) => view.classList.toggle("active", view.id === button.dataset.view));
      });
    });

    logoutButton.addEventListener("click", () => {
      sessionStorage.removeItem("idsHubAdmin");
      location.reload();
    });

    if (sessionStorage.getItem("idsHubAdmin")) {
      loginContainer.classList.add("hidden");
      loginHero.classList.add("hidden");
      dashboard.classList.remove("hidden");
      logoutButton.classList.remove("hidden");
      loadAll();
    }
  </script>
</body>
</html>
